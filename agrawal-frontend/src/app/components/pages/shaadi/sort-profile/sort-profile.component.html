<div class="row">
    <div class="col-lg-6 p-1" *ngFor="let profile of profiles">
        <div class="card shadow-sm mb-3 h-100">
            <div class="row g-0 h-100">
                <div class="col-6">
                    <img src="assets/img/mock-profile2.jpg" class="img-fluid rounded-start"
                        style="object-fit: cover;">
                </div>
                <div class="col-6">
                    <div class="d-flex flex-column h-100">
                        <div class="card-body">
                            <h5 class="card-title mb-1">{{profile.personal.fname}} {{profile.personal.lname}}</h5>
                            <p class="text-muted mb-1">{{profile.personal.dob | age}} yrs</p>
                            <p class="text-muted mb-1">{{profile.personal.city}}</p>
                            <p class="text-muted mb-1">{{profile.personal.education}}</p>
                            <p class="text-muted mb-1">{{profile.personal.jobTitle}}</p>
                            <p class="text-muted mb-1">{{profile.personal.height}} • {{profile.personal.weight}}</p>
                        </div>
                        <div class="d-flex align-items-center justify-content-center align-items-end mt-auto">
                            <div class="px-3 pb-5 w-100 d-flex justify-content-around">
                                <button mat-mini-fab color="primary" [routerLink]="'/profile/'+profile._id"><mat-icon>visibility</mat-icon></button>
                                <button mat-mini-fab color="accent"><mat-icon>share</mat-icon></button>
                                <button mat-mini-fab color="warn" [routerLink]="'/shadi/edit-profile/'+profile._id"><mat-icon>edit</mat-icon></button>
                                <button mat-mini-fab color="warn" (click)="deleteProfile(profile)"><mat-icon>delete</mat-icon></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
