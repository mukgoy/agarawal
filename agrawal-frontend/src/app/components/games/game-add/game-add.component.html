<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Addition Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fa;
    }
    .game-box {
      max-width: 400px;
      margin: auto;
      margin-top: 80px;
      padding: 30px;
      border-radius: 15px;
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    .question {
      font-size: 32px;
      font-weight: bold;
    }
    .score {
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="game-box">
  <h3 class="mb-4">➕ Addition Game</h3>

  <div class="question mb-3" id="question">{{question}}</div>

  <input type="number" class="form-control mb-3 form-control-lg mb-5" placeholder="Enter answer" [(ngModel)]="answer">

  <button class="btn btn-primary w-100 mb-2 btn-lg" (click)="checkAnswer()" *ngIf="!result">Submit</button>
  
  <div id="result" class="mb-2 fw-bold" [style]="{color:result}" *ngIf="result">
    <span *ngIf="result=='green'"> ✅ Correct!</span>
    <span *ngIf="result=='red'">❌ Wrong! Answer: {{correctAnswer}}</span>
</div>
<button class="btn btn-primary w-100 mb-3 btn-lg" (click)="generateQuestion()" *ngIf="result">NEXT</button>

  <div class="score">
    Score: <span id="score">{{score}} / {{maxScore}}</span>
  </div>
</div>




</body>
</html>
